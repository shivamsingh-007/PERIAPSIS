version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: agentic-postgres-staging
    environment:
      POSTGRES_USER: agentic
      POSTGRES_PASSWORD: ${DB_PASSWORD:-agentic_staging}
      POSTGRES_DB: agentic_loop
    ports:
      - "5432:5432"
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentic"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: agentic-redis-staging
    ports:
      - "6379:6379"
    volumes:
      - redis_staging_data:/data

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    container_name: agentic-api-staging
    environment:
      DATABASE_URL: postgresql+asyncpg://agentic:${DB_PASSWORD:-agentic_staging}@postgres:5432/agentic_loop
      REDIS_URL: redis://redis:6379
      ENVIRONMENT: staging
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "alembic upgrade head && uvicorn apps.api.main:app --host 0.0.0.0 --port 8000"

volumes:
  postgres_staging_data:
  redis_staging_data:
